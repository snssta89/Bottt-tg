version: '3.8'

services:
  bot:
    image: your-bot-image:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/dbname
    ports:
      - "8000:8000"

  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: dbname
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"